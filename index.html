<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bank account Create</title>

    <!-- tailwind link 5.00 -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-slate-800">
    <section class="max-w-md min-h-screen mx-auto py-5 bg-slate-200">
      <header>
        <!-- logo container -->
        <nav class="flex justify-center items-center mt-10">
          <div
            class="mt-10 relative flex justify-center items-center w-9/12 mb-10"
          >
            <img class="w-48 absolute" src="./assets/bg.png" alt="" />
            <img class="w-16 mt-8" src="./assets/Group.png" alt="" />
          </div>
        </nav>
        <!-- login items -->
        <div class="">
          <div class="hero-content flex-col lg:flex-row-reverse">
            <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
              <form class="card-body">
                <fieldset class="fieldset">
                  <label class="label">Account NUmber</label>
                  <input
                    value="01773632880"
                    id="account-Number"
                    type="number"
                    class="input"
                    placeholder="type your number"
                    maxlength="11"
                    required
                  />
                  <label class="fieldset-label">PIN</label>
                  <input
                    id="pin-Number"
                    value="1234"
                    type="text"
                    class="input"
                    placeholder="type your pin"
                    required
                  />
                  <div><a class="link link-hover">Forgot password?</a></div>
                  <button id="login-btn" class="btn btn-neutral mt-4">
                    Login
                  </button>
                </fieldset>
              </form>
            </div>
          </div>
        </div>
      </header>
    </section>
    <!-- add js -->
    <script src="js/login.js"></script>
  </body>
</html>
